<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dough N Dosa | Rate Your Experience</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animations.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <script src="https://kit.fontawesome.com/6fcb2dcb8f.js" crossorigin="anonymous"></script>
  </head>

  <body>
    <div class="background"></div>

    <main class="container">
      <!-- Logo -->
      <img src="assets/logo.png" alt="Dough N Dosa Logo" class="logo" />

      <!-- Heading -->
      <h1>How was your experience?</h1>

      <p class="subtitle">We'd love to hear your feedback. Please rate your visit.</p>

      <!-- Rating Card -->
      <div class="rating-card">
        <div class="stars">
          <i class="fa-regular fa-star star" data-rating="1"></i>
          <i class="fa-regular fa-star star" data-rating="2"></i>
          <i class="fa-regular fa-star star" data-rating="3"></i>
          <i class="fa-regular fa-star star" data-rating="4"></i>
          <i class="fa-regular fa-star star" data-rating="5"></i>
        </div>

        <p id="ratingText">Tap a star to continue</p>
      </div>

      <!-- Continue Button -->
      <button id="continueBtn" disabled>Continue</button>
    </main>

    <!-- Loading Overlay -->

    <div id="loadingScreen">
      <div class="loader"></div>

      <p>Redirecting...</p>
    </div>

    <!-- Configuration -->
    <script src="js/config.js"></script>

    <!-- Rating Logic -->
    <script src="js/rating.js"></script>

    <!-- App -->
    <script src="js/app.js"></script>
  </body>
</html>
